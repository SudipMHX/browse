name: Quality Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check Formatting
      run: npm run format -- --check
      
    - name: Lint
      run: npm run lint
      
    - name: Typecheck
      run: npm run typecheck
      
    - name: Build Next.js App
      run: npm run build
