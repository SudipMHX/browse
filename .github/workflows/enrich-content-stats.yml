name: Enrich Content Stats

on:
  push:
    branches: [main]
    paths:
      - "content/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # GH_PAT allows the push to trigger downstream workflows (e.g. Vercel).
          # Falls back to GITHUB_TOKEN — commits will include [skip ci] anyway.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect changed content files
        id: changed
        run: |
          FILES=$(git diff-tree --no-commit-id -r --name-only HEAD \
            | grep '^content/' \
            | grep -E '\.(mdx|md)$' \
            | tr '\n' ',' \
            | sed 's/,$//')

          echo "files=$FILES" >> $GITHUB_OUTPUT

          if [ -z "$FILES" ]; then
            echo "No MDX content files changed in this push."
          else
            echo "Changed content files: $FILES"
          fi

      - name: Run GitHub stats enrichment
        if: steps.changed.outputs.files != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ENRICH_MODE: changed
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/enrich-stats.js

      - name: Commit enriched stats back to main
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only content files — never touch source code
          git add content/

          if git diff --cached --quiet; then
            echo "✅ No stat changes to commit — all values were already up-to-date."
          else
            git commit -m "chore: enrich github stats [skip ci]"
            git push
            echo "✅ Enriched stats committed and pushed."
          fi
